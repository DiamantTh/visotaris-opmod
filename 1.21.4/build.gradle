// ─────────────────────────────────────────────────────────────────────────────
// Visotaris OPMod – Minecraft 1.21.4
// ─────────────────────────────────────────────────────────────────────────────
plugins {
    id 'fabric-loom'                        version '1.14.6'
    id 'org.jetbrains.kotlin.jvm'           version "${kotlin_version}"
}

// version & group kommen aus dem Root-build.gradle (subprojects-Block)

dependencies {
    // Minecraft + Mappings
    //noinspection LoomDependencyNotation
    minecraft "com.mojang:minecraft:1.21.4"
    //noinspection LoomDependencyNotation
    mappings  "net.fabricmc:yarn:1.21.4+build.8:v2"

    // Fabric Loader + API
    //noinspection LoomDependencyNotation
    modImplementation "net.fabricmc:fabric-loader:${fabric_loader_version}"
    //noinspection LoomDependencyNotation
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.113.0+1.21.4"

    // Mod Menu
    modImplementation "com.terraformersmc:modmenu:13.0.0"

    // Kotlin Runtime (fabric-language-kotlin stellt Stdlib + Coroutinen bereit)
    modImplementation "net.fabricmc:fabric-language-kotlin:${fabric_language_kotlin_version}"
}

loom {
    accessWidenerPath = rootProject.file("src/main/resources/noopmod.accesswidener")
    runs {
        client {
            client()
            setConfigName "Visotaris OPMod (1.21.4)"
            ideConfigGenerated true
            runDir "run"
        }
    }
}

base {
    archivesName = 'noopmod'
}

// ── Kotlin-Konfiguration ─────────────────────────────────────────────────────
kotlin {
    jvmToolchain(21)
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    compilerOptions {
        freeCompilerArgs.add("-Xjvm-default=all")
    }
}

// Gemeinsamen Kotlin-Quellpfad einhängen (zusätzlich zum Root-Java-Pfad)
sourceSets {
    main {
        kotlin {
            srcDir rootProject.file('src/main/kotlin')
            srcDir project.file('src/main/kotlin')
        }
    }
}
