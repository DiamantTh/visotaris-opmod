<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Hintergrund-Verlauf: dunkles Mitternachtsblau -->
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#080d18"/>
    </radialGradient>

    <!-- Gold-Verlauf für das V -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="45%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>

    <!-- Weicher Glow hinter dem V -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite  in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Hintergrund (abgerundetes Rechteck) -->
  <rect width="256" height="256" rx="44" fill="url(#bg)"/>

  <!-- Subtiler Rahmen in Gold -->
  <rect width="256" height="256" rx="44" fill="none"
        stroke="#f59e0b" stroke-width="3.5" opacity="0.25"/>

  <!-- Großes V – zentriert, goldener Verlauf, mit Glow -->
  <path d="M 48 52 L 128 196 L 208 52"
        fill="none"
        stroke="url(#gold)"
        stroke-width="30"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Markt-Chart-Balken links (Wirtschafts-Thema: aufsteigende Bar-Chart) -->
  <rect x="18" y="208" width="9" height="18" rx="2" fill="#f59e0b" opacity="0.45"/>
  <rect x="30" y="200" width="9" height="26" rx="2" fill="#f59e0b" opacity="0.55"/>
  <rect x="42" y="190" width="9" height="36" rx="2" fill="#f59e0b" opacity="0.65"/>

  <!-- Markt-Chart-Balken rechts (spiegelverkehrt) -->
  <rect x="229" y="208" width="9" height="18" rx="2" fill="#f59e0b" opacity="0.45"/>
  <rect x="217" y="200" width="9" height="26" rx="2" fill="#f59e0b" opacity="0.55"/>
  <rect x="205" y="190" width="9" height="36" rx="2" fill="#f59e0b" opacity="0.65"/>

  <!-- Kleiner Diamant-Akzent unter dem V-Scheitelpunkt -->
  <polygon points="128,213 140,226 128,239 116,226"
           fill="#f59e0b" opacity="0.7"/>
</svg>
